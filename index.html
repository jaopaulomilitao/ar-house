<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: src/targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item
          id="groundFloor"
          src="src/f_ground_floor_plan_2.glb"
        ></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
<!--         <a-box position="0 0 0" width="1" height="1" depth="1" color="#ff0000"></a-box> -->
        <a-gltf-model
          id="house"
          rotation="270 180 0"
          position="2.55 0.1 0"
          scale="0.11 0.11 0"
          src="#groundFloor"
          animation="property: scale; from: 0.11 0 0.11; to: 0.11 0.11 0.11; dur: 2000; easing: easeInOutQuad; startEvents: start-animation"
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      document.querySelector('a-entity[mindar-image-target]').addEventListener('targetFound', () => {
        const model = document.querySelector('#house');
        model.emit('start-animation');
      });
    </script>
  </body>
</html>
